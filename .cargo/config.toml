[alias]
bin = "espflash save-image --chip esp32c3 --partition-table partitions.csv --target-app-partition factory crimpdeq.bin"
bin-merged = "espflash save-image --chip esp32c3 --partition-table partitions.csv --target-app-partition factory crimpdeq.bin --merge"

[target.riscv32imc-unknown-none-elf]
runner = "probe-rs run --chip esp32c3 --idf-partition-table partitions.csv --idf-target-app-partition factory --no-location --preverify --restore-unwritten --always-print-stacktrace"

[env]
# Defmt Logging
DEFMT_LOG = "off" # Use "trace/debug/info/error/off,crimpdeq=debug" to enable defmt logging

# Progressor
CALIBRATION_PARTITION_LABEL = "calib" # Must match the dedicated partition label in partitions.csv
DEVICE_ID             = "AAAAAAAAAAAA"
DEVICE_NAME           = "Progressor_7125"
DEVICE_VERSION_NUMBER = "2.0.4"

[build]
rustflags = [
  # Required to obtain backtraces
  "-C",
  "force-frame-pointers",
  # Defmt support
  "-C",
  "link-arg=-Tdefmt.x",
  # Link all sections
  "-C",
  "link-arg=-Tlinkall.x",
]

target = "riscv32imc-unknown-none-elf"

[unstable]
build-std = ["alloc", "core"]
